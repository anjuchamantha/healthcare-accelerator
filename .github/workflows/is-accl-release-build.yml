name: is-accelerator-release-build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Extract the version from the pom.xml file so it can be reused
      # in the tag name, release name, and uploaded asset filename
      - name: Extract version from pom.xml
        id: extract_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Project version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build with Maven
        run: mvn clean install

      # Locate the ZIP produced by the IS accelerator distribution module
      - name: Locate ZIP file
        id: locate_zip
        run: |
          mapfile -t ZIPS < <(find ./distribution/is-accelerator/target -maxdepth 1 -type f -name '*.zip' | sort)
          if [[ "${#ZIPS[@]}" -eq 0 ]]; then
            echo "No ZIP artifact found" >&2
            exit 1
          fi
          if [[ "${#ZIPS[@]}" -gt 1 ]]; then
            echo "Multiple ZIP artifacts found: ${ZIPS[*]}" >&2
            exit 1
          fi
          echo "zipfile=${ZIPS[0]}" >> "$GITHUB_OUTPUT"

      # Print the ZIP path as a debug step to confirm the artifact was created
      - name: Print ZIP file path
        run: echo "ZIP file created at ${{ steps.locate_zip.outputs.zipfile }}"

      # Tag the commit with the extracted version so the release is traceable
      - name: Create Tag
        id: create_tag
        run: |
          TAG="v${{ steps.extract_version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists on origin" >&2
            exit 1
          fi
          git tag $TAG
          git push origin $TAG
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Create a GitHub Pre-Release for the IS accelerator
      - name: Create Pre-Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.create_tag.outputs.tag }}
          release_name: "Healthcare IS Accelerator - ${{ steps.create_tag.outputs.tag }}"
          draft: false
          prerelease: true

      # Upload the IS accelerator ZIP to the Pre-Release
      - name: Upload ZIP to Pre-Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.locate_zip.outputs.zipfile }}
          asset_name: "wso2-hcis-accelerator-${{ steps.extract_version.outputs.version }}.zip"
          asset_content_type: application/zip
